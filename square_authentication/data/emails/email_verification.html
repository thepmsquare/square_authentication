<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&family=Fraunces:wght@300;400&display=swap"
          rel="stylesheet">
</head>

<body style="margin:0; background:#f5f5f5;">

<div style="padding:40px 20px; font-family:'Fraunces', Georgia, serif;">

    <div style="max-width:520px; margin:auto; background:white; padding:32px; border-radius:10px;">

        <h2 style="
        font-family:'Outfit', Arial, sans-serif;
        margin-top:0;
        margin-bottom:24px;
        font-weight:600;
        letter-spacing:0.5px;
      ">
            Email Verification
        </h2>

        <p style="font-size:16px; line-height:1.6;">
            Your verification code is:
        </p>

        <div style="
        text-align:center;
        font-size:34px;
        letter-spacing:8px;
        padding:18px;
        margin:24px 0;
        border-radius:8px;
        background:#f0f0f0;
        font-family:'Outfit', monospace;
        font-weight:600;
      ">
            {verification_code}
        </div>

        <p style="font-size:16px; line-height:1.6;">
            This code will expire in <b>{expiry_minutes} minutes</b>.
        </p>

        <p style="
        font-size:14px;
        color:#777;
        margin-top:28px;
        line-height:1.6;
      ">
            If you did not initiate this verification, you can safely ignore this email.
        </p>

    </div>

</div>

</body>
</html>
