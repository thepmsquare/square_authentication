<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&family=Fraunces:wght@300;400&display=swap"
          rel="stylesheet">

    <style>
        :root { color-scheme: light dark; }

        @media (prefers-color-scheme: dark) {
            .wrapper   { background: #1a1a1a !important; }
            .card      { background: #2d2d2d !important; color: #e0e0e0 !important; }
            .code-box  { background: #3a3a3a !important; color: #ffffff !important; }
            .muted     { color: #999 !important; }
        }
    </style>
</head>

<body style="margin:0; padding:0;">

<!-- Hidden: helps Apple/Android auto-fill parsers find the code -->
<div style="display:none; max-height:0; overflow:hidden;">
    your verification code is {verification_code}
</div>

<div class="wrapper" style="
    padding:40px 20px;
    background:#f5f5f5;
    font-family:'Fraunces', Georgia, serif;
">
    <div class="card" style="
        max-width:520px;
        margin:auto;
        background:#ffffff;
        color:#333;
        padding:32px;
        border-radius:10px;
    ">

        <h2 style="
            font-family:'Outfit', Arial, sans-serif;
            margin:0 0 24px 0;
            font-weight:600;
        ">
            here's your code
        </h2>

        <p style="font-size:16px; line-height:1.6;">
            tap the code below to select it:
        </p>

        <div class="code-box" style="
            text-align:center;
            padding:20px;
            margin:20px 0 24px 0;
            border-radius:8px;
            background:#f0f0f0;
        ">
            <code style="
                font-size:34px;
                font-family:'Outfit', monospace;
                font-weight:600;
                letter-spacing:4px;
                background:transparent;
                user-select:all;
                -webkit-user-select:all;
                -moz-user-select:all;
                cursor:pointer;
            ">{verification_code}</code>
        </div>

        <p style="font-size:16px; line-height:1.6;">
            this code expires in <b>{expiry_minutes} minutes</b>.
        </p>

        {clickable_link_section}

        <p class="muted" style="
            font-size:14px;
            color:#777;
            margin-top:28px;
            line-height:1.6;
        ">
            didn't request this? just ignore this email.
        </p>

    </div>
</div>

</body>
</html>
